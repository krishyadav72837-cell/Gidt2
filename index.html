<!DOCTYPE html><html lang="ne">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Aakriti ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: #fff;
      text-align: center;
      overflow-x: hidden;
    }h1 { margin-top: 40px; }

.container { padding: 20px; }

.gallery img {
  width: 90%;
  max-width: 300px;
  border-radius: 20px;
  margin: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.btn {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  font-size: 1rem;
  cursor: pointer;
  margin: 10px;
}

.yes { background: #28a745; color: white; }
.no { background: #dc3545; color: white; position: absolute; }

.hidden { display: none; }

.love-msg {
  font-size: 1.8rem;
  margin-top: 20px;
  animation: fadeIn 2s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}

#timer {
  font-size: 1.2rem;
  margin-top: 10px;
}

  </style>
</head>
<body><audio id="bgMusic" loop autoplay>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio><canvas id="fireworks"></canvas>

<div class="container">
  <h1>💖 Aakriti Shrestha 💖</h1>  <p id="typing"></p>  <div id="timer"></div>  <div class="gallery">
    <img src="image1.png">
    <img src="image2.png">
    <img src="image3.png">
  </div>  <h2>Do you love me? 😘</h2><button class="btn yes" onclick="sayYes()">Umm 💖</button> <button class="btn no" id="noBtn">Xaina 😜</button>

  <div id="result" class="hidden">
    <p class="love-msg">BIG I LOVE YOU MY BABE 😘💝</p>
    <p>Timro pet ma mero bacha xa 😁😂💖</p>
  </div>
</div><script>
// Typing Effect
const text = "तिमी मेरो जीवनको सबैभन्दा महत्वपूर्ण मान्छे हौ ❤️";
let i = 0;
function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 50);
  }
}
type();

// Love Timer
const startDate = new Date("2024-01-01");
function updateTimer() {
  const now = new Date();
  const diff = now - startDate;

  const days = Math.floor(diff / (1000*60*60*24));
  document.getElementById("timer").innerText = "Together for " + days + " days 💕";
}
setInterval(updateTimer, 1000);

// Moving No Button
const noBtn = document.getElementById('noBtn');
noBtn.addEventListener('mouseover', () => {
  const x = Math.random() * window.innerWidth;
  const y = Math.random() * window.innerHeight;
  noBtn.style.left = x + 'px';
  noBtn.style.top = y + 'px';
});

// Yes Click
function sayYes() {
  document.getElementById('result').classList.remove('hidden');
  startFireworks();
}

// Fireworks
const canvas = document.getElementById('fireworks');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework(x, y) {
  for (let i = 0; i < 60; i++) {
    particles.push({
      x, y,
      speedX: (Math.random() - 0.5) * 6,
      speedY: (Math.random() - 0.5) * 6,
      life: 100
    });
  }
}

function startFireworks() {
  setInterval(() => {
    createFirework(Math.random()*canvas.width, Math.random()*canvas.height);
  }, 400);
}

function animate() {
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p, i) => {
    p.x += p.speedX;
    p.y += p.speedY;
    p.life--;

    ctx.fillStyle = 'white';
    ctx.fillRect(p.x, p.y, 2, 2);

    if (p.life <= 0) particles.splice(i, 1);
  });

  requestAnimationFrame(animate);
}

animate();
</script></body>
</html>
